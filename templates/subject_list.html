{% extends 'base.html' %}

{% block title %}专业列表 - GradRadar{% endblock %}

{% block content %}

<div class="mb-6">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">📖 专业（学科）列表</h1>
    <p class="text-gray-600">按国家学科目录浏览，查看各学科的院校评级</p>
</div>

<!-- 筛选 -->
<div class="bg-white rounded-lg shadow-sm p-4 mb-6">
    <div class="flex flex-wrap gap-3">
        <input type="text" id="search-input" placeholder="搜索学科名称或代码..."
               class="flex-1 min-w-[200px] px-3 py-2 border rounded outline-none focus:ring-2 focus:ring-blue-500">

        <select id="level-filter" class="px-3 py-2 border rounded">
            <option value="">全部层级</option>
            <option value="category">学科门类</option>
            <option value="first_class">一级学科</option>
            <option value="second_class">二级学科</option>
            <option value="professional_category">专业学位类别</option>
            <option value="professional_field">专业学位领域</option>
        </select>

        <select id="category-filter" class="px-3 py-2 border rounded">
            <option value="">全部门类</option>
            <option value="01">哲学</option>
            <option value="02">经济学</option>
            <option value="03">法学</option>
            <option value="04">教育学</option>
            <option value="05">文学</option>
            <option value="06">历史学</option>
            <option value="07">理学</option>
            <option value="08">工学</option>
            <option value="09">农学</option>
            <option value="10">医学</option>
            <option value="12">管理学</option>
            <option value="13">艺术学</option>
            <option value="14">交叉学科</option>
        </select>

        <button id="reset-btn" class="px-4 py-2 text-gray-600 hover:text-gray-800">重置</button>
    </div>
</div>

<div id="subject-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
    <div class="loading col-span-full">加载中...</div>
</div>

<div id="pagination" class="flex justify-center items-center space-x-2 mt-8"></div>

{% endblock %}

{% block extra_js %}
<script>
    let currentPage = 1;

    async function loadSubjects(page = 1) {
        const search = document.getElementById('search-input').value;
        const level = document.getElementById('level-filter').value;
        const category = document.getElementById('category-filter').value;

        let url = `/api/subjects/?page=${page}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        if (level) url += `&level=${level}`;
        if (category) url += `&category_code=${category}`;

        try {
            const data = await apiRequest(url);
            renderSubjects(data.results);
            renderPagination(data);
        } catch (error) {
            document.getElementById('subject-list').innerHTML = '<div class="loading col-span-full">加载失败</div>';
        }
    }

    function renderSubjects(subjects) {
    const container = document.getElementById('subject-list');
    if (subjects.length === 0) {
        container.innerHTML = '<div class="loading col-span-full">没有匹配的学科</div>';
        return;
    }

    container.innerHTML = subjects.map(s => `
        <a href="/subjects/${s.id}/" class="block bg-white rounded-lg p-5 shadow-sm card-hover">
            <div class="flex items-start justify-between mb-2">
                <div class="flex-1">
                    <h3 class="text-lg font-semibold text-gray-800">${s.name}</h3>
                    <p class="text-sm text-gray-500 mt-1">代码：${s.code}</p>
                </div>
                <span class="px-2 py-1 text-xs bg-blue-100 text-blue-700 rounded whitespace-nowrap ml-2">${s.level_display || s.level}</span>
            </div>
            <div class="mt-3 flex items-center justify-between text-sm">
                <span class="text-gray-600">${s.category_name || '-'}</span>
                <div class="text-gray-500 text-xs">
                    <span title="有评级的学校">🏆 ${s.rating_count || 0}</span>
                    <span class="ml-2" title="录入的招生专业">📚 ${s.major_count || 0}</span>
                </div>
            </div>
        </a>
    `).join('');
}

    function renderPagination(data) {
        const totalPages = Math.ceil(data.count / 20);
        const container = document.getElementById('pagination');
        if (totalPages <= 1) {
            container.innerHTML = '';
            return;
        }

        container.innerHTML = `
        <button onclick="changePage(${currentPage - 1})" ${!data.previous ? 'disabled' : ''}
            class="px-3 py-1 border rounded ${!data.previous ? 'opacity-50' : 'hover:bg-gray-100'}">上一页</button>
        <span class="px-3 py-1 text-gray-600">第 ${currentPage} / ${totalPages} 页</span>
        <button onclick="changePage(${currentPage + 1})" ${!data.next ? 'disabled' : ''}
            class="px-3 py-1 border rounded ${!data.next ? 'opacity-50' : 'hover:bg-gray-100'}">下一页</button>
    `;
    }

    function changePage(p) {
        currentPage = p;
        loadSubjects(p);
        window.scrollTo(0, 0);
    }

    let timer;
    document.getElementById('search-input').addEventListener('input', () => {
        clearTimeout(timer);
        timer = setTimeout(() => {
            currentPage = 1;
            loadSubjects(1);
        }, 300);
    });
    document.getElementById('level-filter').addEventListener('change', () => {
        currentPage = 1;
        loadSubjects(1);
    });
    document.getElementById('category-filter').addEventListener('change', () => {
        currentPage = 1;
        loadSubjects(1);
    });
    document.getElementById('reset-btn').addEventListener('click', () => {
        document.getElementById('search-input').value = '';
        document.getElementById('level-filter').value = '';
        document.getElementById('category-filter').value = '';
        currentPage = 1;
        loadSubjects(1);
    });

    loadSubjects(1);
</script>
{% endblock %}
