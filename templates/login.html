{% extends 'base.html' %}

{% block title %}登录 - GradRadar{% endblock %}

{% block content %}

<div class="max-w-md mx-auto bg-white rounded-lg shadow-sm p-8 mt-12">
    <h1 class="text-2xl font-bold text-center mb-6">登录</h1>

    <form id="login-form" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">用户名</label>
            <input type="text" id="username" required class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">密码</label>
            <input type="password" id="password" required class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
        </div>
        <div id="error-msg" class="hidden text-red-600 text-sm"></div>
        <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700">登录</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
        还没账号？<a href="/register/" class="text-blue-600 hover:underline">立即注册</a>
    </p>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('error-msg');

    try {
        await apiRequest('/api/user/login/', {
            method: 'POST',
            body: JSON.stringify({ username, password })
        });
        window.location.href = '/';
    } catch (error) {
        errorMsg.textContent = error.data?.error || '登录失败';
        errorMsg.classList.remove('hidden');
    }
});
</script>
{% endblock %}
