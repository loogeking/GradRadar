{% extends 'base.html' %}

{% block title %}注册 - GradRadar{% endblock %}

{% block content %}

<div class="max-w-md mx-auto bg-white rounded-lg shadow-sm p-8 mt-12">
    <h1 class="text-2xl font-bold text-center mb-6">注册账号</h1>

    <form id="register-form" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">用户名</label>
            <input type="text" id="username" required class="w-full px-3 py-2 border rounded outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">邮箱（可选）</label>
            <input type="email" id="email" class="w-full px-3 py-2 border rounded outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">密码</label>
            <input type="password" id="password" required minlength="8" class="w-full px-3 py-2 border rounded outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">确认密码</label>
            <input type="password" id="password2" required minlength="8" class="w-full px-3 py-2 border rounded outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div id="error-msg" class="hidden text-red-600 text-sm"></div>
        <button type="submit" class="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700">注册</button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-4">
        已有账号？<a href="/login/" class="text-blue-600 hover:underline">立即登录</a>
    </p>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.getElementById('register-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const errorMsg = document.getElementById('error-msg');

    try {
        await apiRequest('/api/user/register/', {
            method: 'POST',
            body: JSON.stringify({ username, email, password, password2 })
        });
        alert('注册成功！');
        window.location.href = '/';
    } catch (error) {
        const errors = error.data || {};
        const msgs = [];
        Object.keys(errors).forEach(k => {
            const v = errors[k];
            msgs.push(`${k}: ${Array.isArray(v) ? v.join(', ') : v}`);
        });
        errorMsg.textContent = msgs.join(' | ') || '注册失败';
        errorMsg.classList.remove('hidden');
    }
});
</script>
{% endblock %}
