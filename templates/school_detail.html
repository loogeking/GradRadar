{% extends 'base.html' %}

{% block title %}院校详情 - GradRadar{% endblock %}

{% block content %}

<div id="school-detail">
    <div class="loading">加载中...</div>
</div>

{% endblock %}

{% block extra_js %}
<script>
const schoolId = {{ school_id }};

async function loadSchoolDetail() {
    try {
        const school = await apiRequest(`/api/schools/${schoolId}/`);
        renderSchool(school);
        loadNotices();
    } catch (error) {
        document.getElementById('school-detail').innerHTML = '<div class="loading">加载失败</div>';
    }
}

function renderSchool(school) {
    let collegesHtml = '';
    if (school.colleges && school.colleges.length > 0) {
        collegesHtml = school.colleges.map(c => `
            <div class="bg-white rounded-lg p-4 shadow-sm">
                <h3 class="font-semibold text-gray-800 mb-2">${c.name}</h3>
                <div id="majors-of-${c.id}" class="space-y-1 text-sm">
                    <div class="text-gray-400">加载专业中...</div>
                </div>
            </div>
        `).join('');
    } else {
        collegesHtml = '<div class="loading">暂无学院数据</div>';
    }

    document.getElementById('school-detail').innerHTML = `
        <div class="bg-white rounded-lg shadow-sm p-6 mb-6">
            <div class="flex items-start justify-between flex-wrap">
                <div>
                    <h1 class="text-3xl font-bold text-gray-800 mb-2">${school.name}</h1>
                    <div class="mb-3 flex flex-wrap gap-1">
                        ${getSchoolTags(school)}
                        ${school.is_self_scoring ? '<span class="px-2 py-0.5 text-xs rounded bg-red-100 text-red-700">34所</span>' : ''}
                        ${school.school_type_display ? `<span class="px-2 py-0.5 text-xs rounded bg-gray-100 text-gray-700">${school.school_type_display}</span>` : ''}
                    </div>
                    <p class="text-gray-600">
                        📍 ${school.province_name}
                        ${school.province_area_display ? ' · ' + school.province_area_display : ''}
                        ${school.code ? '　🆔 ' + school.code : ''}
                    </p>
                    ${school.official_url ? `<p class="mt-2"><a href="${school.official_url}" target="_blank" class="text-blue-600 hover:underline">研究生院官网 →</a></p>` : ''}
                    <p class="text-sm text-gray-500 mt-2">
                        共 ${school.college_count} 个学院 · ${school.major_count} 个招生专业
                    </p>
                </div>
                <button id="favorite-btn" class="px-4 py-2 bg-yellow-100 text-yellow-700 rounded hover:bg-yellow-200">
                    ⭐ 收藏院校
                </button>
            </div>
            ${school.description ? `<p class="mt-4 text-gray-700">${school.description}</p>` : ''}
        </div>

        <section class="mb-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-4">📚 学院与专业</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                ${collegesHtml}
            </div>
        </section>

        <section>
            <h2 class="text-2xl font-bold text-gray-800 mb-4">📢 最新公告</h2>
            <div id="school-notices" class="bg-white rounded-lg shadow-sm divide-y">
                <div class="loading">加载中...</div>
            </div>
        </section>
    `;

    if (school.colleges) {
        school.colleges.forEach(c => loadCollegeMajors(c.id));
    }

    document.getElementById('favorite-btn').addEventListener('click', () => addFavorite('school', schoolId));
}

async function loadCollegeMajors(collegeId) {
    try {
        const data = await apiRequest(`/api/majors/?college=${collegeId}&page_size=200`);
        const container = document.getElementById(`majors-of-${collegeId}`);
        if (data.results.length === 0) {
            container.innerHTML = '<div class="text-gray-400 text-sm">暂无专业数据</div>';
            return;
        }
        container.innerHTML = data.results.map(m => `
            <a href="/majors/${m.id}/" class="block py-1 text-blue-600 hover:underline">
                ${m.name}
                <span class="text-gray-400">(${m.code})</span>
                ${m.exam_type_display && m.exam_type !== 'unified' ? `<span class="ml-1 px-1 text-xs bg-orange-100 text-orange-700 rounded">${m.exam_type_display}</span>` : ''}
                ${m.learning_type !== 'full_time' ? `<span class="ml-1 px-1 text-xs bg-gray-100 text-gray-600 rounded">${m.learning_type_display}</span>` : ''}
            </a>
        `).join('');
    } catch (error) {
        document.getElementById(`majors-of-${collegeId}`).innerHTML = '<div class="text-gray-400">加载失败</div>';
    }
}

async function loadNotices() {
    try {
        const data = await apiRequest(`/api/notices/?school=${schoolId}&page_size=10`);
        const container = document.getElementById('school-notices');
        if (data.results.length === 0) {
            container.innerHTML = '<div class="loading">暂无公告</div>';
            return;
        }
        container.innerHTML = data.results.map(n => `
            <a href="${n.url}" target="_blank" class="block p-4 hover:bg-gray-50">
                <div class="flex justify-between">
                    <span class="text-gray-800">${n.title}</span>
                    <span class="text-sm text-gray-400 ml-4">${n.publish_date || ''}</span>
                </div>
            </a>
        `).join('');
    } catch (error) {
        document.getElementById('school-notices').innerHTML = '<div class="loading">加载失败</div>';
    }
}

async function addFavorite(type, id) {
    try {
        const payload = { target_type: type };
        if (type === 'school') payload.school = id;
        if (type === 'major') payload.major = id;

        await apiRequest('/api/user/favorites/', {
            method: 'POST',
            body: JSON.stringify(payload)
        });
        showToast('收藏成功', 'success');
    } catch (error) {
        if (error.status === 403 || error.status === 401) {
            showModal({
                title: '需要登录',
                content: '收藏功能需要登录，是否跳转到登录页？',
                confirmText: '去登录',
                onConfirm: () => window.location.href = '/login/'
            });
        } else {
            showToast('收藏失败', 'error');
        }
    }
}

loadSchoolDetail();
</script>
{% endblock %}
