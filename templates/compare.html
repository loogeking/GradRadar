{% extends 'base.html' %}

{% block title %}专业对比 - GradRadar{% endblock %}

{% block content %}

<div class="mb-6">
    <h1 class="text-3xl font-bold mb-2">专业对比</h1>
    <p class="text-gray-600">最多可同时对比5个专业的复试线和招生情况</p>
</div>

<!-- 添加方式：搜索 + 从收藏选 -->
<div class="bg-white rounded-lg shadow-sm p-4 mb-6">
    <div class="flex gap-3 items-center">
        <div class="flex-1 relative">
            <input type="text" id="major-search" placeholder="🔍 搜索专业名称或学校..."
                   class="w-full px-3 py-2 border rounded outline-none focus:ring-2 focus:ring-blue-500">
            <div id="search-suggestions" class="hidden absolute left-0 right-0 top-full mt-1 bg-white border rounded shadow max-h-60 overflow-y-auto z-10"></div>
        </div>
        <button id="from-favorites-btn" class="px-4 py-2 bg-yellow-100 text-yellow-700 rounded hover:bg-yellow-200 whitespace-nowrap">
            ⭐ 从收藏选择
        </button>
    </div>
</div>

<!-- 已选 -->
<div class="mb-6">
    <h2 class="text-lg font-semibold mb-2">已选专业 (<span id="selected-count">0</span>/5)</h2>
    <div id="selected-list" class="flex flex-wrap gap-2">
        <span class="text-gray-400">尚未选择专业</span>
    </div>
    <button id="compare-btn" disabled class="mt-3 px-4 py-2 bg-blue-600 text-white rounded disabled:opacity-50 disabled:cursor-not-allowed">
        开始对比
    </button>
    <button id="clear-btn" class="mt-3 ml-2 px-4 py-2 text-gray-600 hover:text-gray-800">清空</button>
</div>

<div id="compare-result"></div>

<!-- 从收藏选择的弹窗 -->
<div id="favorites-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
    <div class="bg-white rounded-lg shadow-xl max-w-lg w-full mx-4 max-h-[80vh] flex flex-col">
        <div class="px-6 py-4 border-b flex justify-between items-center">
            <h3 class="text-lg font-bold">从收藏中选择专业</h3>
            <button id="close-fav-modal" class="text-gray-400 hover:text-gray-600 text-2xl">×</button>
        </div>
        <div class="px-6 py-4 flex-1 overflow-y-auto">
            <div id="fav-major-list" class="space-y-2">
                <div class="loading">加载中...</div>
            </div>
        </div>
        <div class="px-6 py-3 border-t bg-gray-50 flex justify-end space-x-2">
            <button id="cancel-fav-btn" class="px-4 py-2 border rounded hover:bg-gray-100">取消</button>
            <button id="add-fav-btn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">添加所选 (<span id="fav-selected-count">0</span>)</button>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
let selectedMajors = [];
let favoriteMajors = [];  // 用户的收藏列表
let favSelectedIds = new Set();  // 弹窗中临时选中的

// ==================== 搜索添加 ====================
async function searchMajors(keyword) {
    if (!keyword.trim()) {
        document.getElementById('search-suggestions').classList.add('hidden');
        return;
    }
    try {
        const data = await apiRequest(`/api/majors/?search=${encodeURIComponent(keyword)}&page_size=10`);
        const container = document.getElementById('search-suggestions');
        if (data.results.length === 0) {
            container.innerHTML = '<div class="p-3 text-gray-400">无匹配结果</div>';
        } else {
            container.innerHTML = data.results.map(m => {
                const fullName = m.full_name || `${m.school_name} - ${m.college_name} - ${m.name}`;
                return `
                    <div class="p-3 hover:bg-gray-100 cursor-pointer" onclick='addMajor(${m.id}, ${JSON.stringify(fullName)})'>
                        <div class="text-xs text-gray-500">${m.school_name} · ${m.college_name}</div>
                        <div class="font-medium">${m.name} <span class="text-gray-400 text-sm">(${m.code})</span></div>
                    </div>
                `;
            }).join('');
        }
        container.classList.remove('hidden');
    } catch (e) { console.error(e); }
}

function addMajor(id, name) {
    if (selectedMajors.find(m => m.id === id)) {
        showToast('已添加过该专业', 'warning');
        return;
    }
    if (selectedMajors.length >= 5) {
        showToast('最多对比5个专业', 'warning');
        return;
    }
    selectedMajors.push({ id, name });
    renderSelected();
    document.getElementById('search-suggestions').classList.add('hidden');
    document.getElementById('major-search').value = '';
}

function removeMajor(id) {
    selectedMajors = selectedMajors.filter(m => m.id !== id);
    renderSelected();
}

function renderSelected() {
    const list = document.getElementById('selected-list');
    document.getElementById('selected-count').textContent = selectedMajors.length;
    if (selectedMajors.length === 0) {
        list.innerHTML = '<span class="text-gray-400">尚未选择专业</span>';
    } else {
        list.innerHTML = selectedMajors.map(m => `
            <span class="inline-flex items-center px-3 py-2 bg-blue-100 text-blue-700 rounded text-sm">
                <span class="max-w-xs truncate" title="${m.name}">${m.name}</span>
                <button onclick="removeMajor(${m.id})" class="ml-2 text-blue-500 hover:text-blue-800 font-bold">×</button>
            </span>
        `).join('');
    }
    document.getElementById('compare-btn').disabled = selectedMajors.length < 2;
}

// ==================== 从收藏选择 ====================
async function openFavoritesModal() {
    document.getElementById('favorites-modal').classList.remove('hidden');
    favSelectedIds.clear();
    updateFavSelectedCount();
    try {
        const data = await apiRequest('/api/user/favorites/?page_size=200');
        favoriteMajors = (data.results || []).filter(f => f.target_type === 'major');
        renderFavMajorList();
    } catch (error) {
        if (error.status === 403 || error.status === 401) {
            document.getElementById('fav-major-list').innerHTML =
                '<div class="text-center py-6"><p class="text-gray-500 mb-3">需要登录才能查看收藏</p>' +
                '<a href="/login/" class="px-4 py-2 bg-blue-600 text-white rounded">去登录</a></div>';
        } else {
            document.getElementById('fav-major-list').innerHTML = '<div class="loading">加载失败</div>';
        }
    }
}

function renderFavMajorList() {
    const container = document.getElementById('fav-major-list');
    if (favoriteMajors.length === 0) {
        container.innerHTML = '<div class="text-center py-6 text-gray-500">还没有收藏的专业<br><a href="/subjects/" class="text-blue-600 hover:underline">去浏览</a></div>';
        return;
    }
    container.innerHTML = favoriteMajors.map(f => {
        const isAlreadyAdded = selectedMajors.find(m => m.id === f.major);
        const fullName = f.major_full_name || f.major_name;
        return `
            <label class="flex items-start p-3 border rounded hover:bg-gray-50 cursor-pointer ${isAlreadyAdded ? 'opacity-50' : ''}">
                <input type="checkbox" class="fav-checkbox mr-3 mt-1" value="${f.major}"
                       data-name="${fullName}" ${isAlreadyAdded ? 'disabled' : ''}>
                <div class="flex-1 min-w-0">
                    <div class="text-xs text-gray-500">${f.major_school_name} · ${f.major_college_name}</div>
                    <div class="font-medium">${f.major_name} <span class="text-gray-400 text-sm">(${f.major_code})</span></div>
                    ${isAlreadyAdded ? '<div class="text-xs text-gray-400 mt-1">已在对比列表中</div>' : ''}
                </div>
            </label>
        `;
    }).join('');

    container.querySelectorAll('.fav-checkbox').forEach(cb => {
        cb.addEventListener('change', () => {
            if (cb.checked) {
                if (favSelectedIds.size + selectedMajors.length >= 5) {
                    cb.checked = false;
                    showToast('最多对比5个专业', 'warning');
                    return;
                }
                favSelectedIds.add({ id: parseInt(cb.value), name: cb.dataset.name });
            } else {
                favSelectedIds.forEach(item => {
                    if (item.id === parseInt(cb.value)) favSelectedIds.delete(item);
                });
            }
            updateFavSelectedCount();
        });
    });
}

function updateFavSelectedCount() {
    document.getElementById('fav-selected-count').textContent = favSelectedIds.size;
}

function closeFavModal() {
    document.getElementById('favorites-modal').classList.add('hidden');
}

function addFromFavorites() {
    favSelectedIds.forEach(item => {
        if (!selectedMajors.find(m => m.id === item.id)) {
            selectedMajors.push(item);
        }
    });
    renderSelected();
    closeFavModal();
    showToast(`已添加 ${favSelectedIds.size} 个专业`, 'success');
}

// ==================== 对比 ====================
async function doCompare() {
    const ids = selectedMajors.map(m => m.id).join(',');
    try {
        const data = await apiRequest(`/api/compare/?ids=${ids}`);
        renderCompareResult(data.results);
    } catch (error) {
        showToast(error.data?.error || '对比失败', 'error');
    }
}

function renderCompareResult(majors) {
    const allYears = new Set();
    majors.forEach(m => (m.score_lines || []).forEach(s => allYears.add(s.year)));
    const years = Array.from(allYears).sort();

    const scoreSeries = majors.map(m => ({
        name: `${m.school_name}-${m.name}`,
        type: 'line',
        smooth: true,
        data: years.map(y => {
            const s = (m.score_lines || []).find(s => s.year === y);
            return s ? s.total_score : null;
        }),
    }));

    document.getElementById('compare-result').innerHTML = `
        <section class="bg-white rounded-lg shadow-sm p-6 mb-6">
            <h2 class="text-2xl font-bold mb-4">📊 复试线对比</h2>
            <div id="compare-score-chart" class="chart-container"></div>
        </section>

        <section class="bg-white rounded-lg shadow-sm p-6">
            <h2 class="text-2xl font-bold mb-4">📋 专业详情对比</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-gray-50 border-b">
                        <tr>
                            <th class="px-3 py-2 text-left">项目</th>
                            ${majors.map(m => `<th class="px-3 py-2 text-left">${m.school_name}<br><span class="text-gray-500 font-normal">${m.name}</span></th>`).join('')}
                        </tr>
                    </thead>
                    <tbody class="divide-y">
                        <tr><td class="px-3 py-2 font-medium">专业代码</td>${majors.map(m => `<td class="px-3 py-2">${m.code}</td>`).join('')}</tr>
                        <tr><td class="px-3 py-2 font-medium">学位类型</td>${majors.map(m => `<td class="px-3 py-2">${m.degree_type === 'academic' ? '学硕' : '专硕'}</td>`).join('')}</tr>
                        <tr><td class="px-3 py-2 font-medium">最新复试线</td>${majors.map(m => {
                            const latest = (m.score_lines || []).sort((a,b) => b.year - a.year)[0];
                            return `<td class="px-3 py-2 text-blue-600 font-medium">${latest ? latest.total_score + '分(' + latest.year + ')' : '-'}</td>`;
                        }).join('')}</tr>
                        <tr><td class="px-3 py-2 font-medium">最新招生计划</td>${majors.map(m => {
                            const latest = (m.enrollments || []).sort((a,b) => b.year - a.year)[0];
                            return `<td class="px-3 py-2">${latest ? latest.plan_total + '人' : '-'}</td>`;
                        }).join('')}</tr>
                        <tr><td class="px-3 py-2 font-medium">推免比例</td>${majors.map(m => {
                            const latest = (m.enrollments || []).sort((a,b) => b.year - a.year)[0];
                            return `<td class="px-3 py-2">${latest && latest.recommend_ratio ? latest.recommend_ratio + '%' : '-'}</td>`;
                        }).join('')}</tr>
                    </tbody>
                </table>
            </div>
        </section>
    `;

    setTimeout(() => {
        const chart = echarts.init(document.getElementById('compare-score-chart'));
        chart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { bottom: 0, type: 'scroll' },
            grid: { left: '3%', right: '4%', bottom: '20%', containLabel: true },
            xAxis: { type: 'category', data: years.map(y => y + '年') },
            yAxis: { type: 'value', name: '分数' },
            series: scoreSeries
        });
    }, 100);
}

// ==================== 事件绑定 ====================
let timer;
document.getElementById('major-search').addEventListener('input', (e) => {
    clearTimeout(timer);
    timer = setTimeout(() => searchMajors(e.target.value), 300);
});
document.getElementById('compare-btn').addEventListener('click', doCompare);
document.getElementById('clear-btn').addEventListener('click', () => {
    selectedMajors = [];
    renderSelected();
    document.getElementById('compare-result').innerHTML = '';
});
document.getElementById('from-favorites-btn').addEventListener('click', openFavoritesModal);
document.getElementById('close-fav-modal').addEventListener('click', closeFavModal);
document.getElementById('cancel-fav-btn').addEventListener('click', closeFavModal);
document.getElementById('add-fav-btn').addEventListener('click', addFromFavorites);

document.addEventListener('click', (e) => {
    if (!e.target.closest('#major-search') && !e.target.closest('#search-suggestions')) {
        document.getElementById('search-suggestions').classList.add('hidden');
    }
});
</script>
{% endblock %}
