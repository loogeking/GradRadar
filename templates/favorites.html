{% extends 'base.html' %}

{% block title %}我的收藏 - GradRadar{% endblock %}

{% block content %}

<h1 class="text-3xl font-bold mb-6">⭐ 我的收藏</h1>

<div id="favorites-list" class="space-y-3">
    <div class="loading">加载中...</div>
</div>

{% endblock %}

{% block extra_js %}
<script>
async function loadFavorites() {
    try {
        const data = await apiRequest('/api/user/favorites/');
        const container = document.getElementById('favorites-list');

        if (data.results.length === 0) {
            container.innerHTML = '<div class="loading">还没有收藏，去<a href="/schools/" class="text-blue-600 hover:underline">浏览院校</a>吧</div>';
            return;
        }

        container.innerHTML = data.results.map(f => {
            const isSchool = f.target_type === 'school';
            const link = isSchool ? `/schools/${f.school}/` : `/majors/${f.major}/`;
            const name = isSchool ? f.school_name : f.major_name;
            return `
                <div class="bg-white rounded shadow-sm p-4 flex justify-between items-center">
                    <a href="${link}" class="flex-1">
                        <span class="px-2 py-0.5 text-xs ${isSchool ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'} rounded mr-2">
                            ${isSchool ? '院校' : '专业'}
                        </span>
                        <span class="font-medium">${name}</span>
                    </a>
                    <button onclick="removeFavorite(${f.id})" class="text-red-600 hover:text-red-800 text-sm">删除</button>
                </div>
            `;
        }).join('');
    } catch (error) {
        if (error.status === 403 || error.status === 401) {
            document.getElementById('favorites-list').innerHTML =
                '<div class="loading">请先<a href="/login/" class="text-blue-600 hover:underline">登录</a></div>';
        } else {
            document.getElementById('favorites-list').innerHTML = '<div class="loading">加载失败</div>';
        }
    }
}

async function removeFavorite(id) {
    if (!confirm('确定取消收藏？')) return;
    try {
        await apiRequest(`/api/user/favorites/${id}/`, { method: 'DELETE' });
        loadFavorites();
    } catch (error) {
        alert('删除失败');
    }
}

loadFavorites();
</script>
{% endblock %}
